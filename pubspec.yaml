name: sgftp_mobile
description: Aplicación móvil cliente del sistema SGFTP - Fundación Tamarindo Park
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  go_router: ^13.2.0
  provider: ^6.1.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/db.json
    - assets/data/imagen_proyecto.jpg
    - assets/data/imagen_actividad.jpg
